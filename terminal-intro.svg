<svg viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" font-family="'Fira Code', 'Consolas', monospace">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F2027"/>
      <stop offset="50%" stop-color="#203A43"/>
      <stop offset="100%" stop-color="#2C5364"/>
    </linearGradient>
    <clipPath id="clip1"><rect x="0" y="0" width="0" height="40"><animate attributeName="width" from="0" to="850" dur="0.9s" begin="0.3s" fill="freeze"/></rect></clipPath>
    <clipPath id="clip2"><rect x="0" y="0" width="0" height="40"><animate attributeName="width" from="0" to="850" dur="1.3s" begin="1.3s" fill="freeze"/></rect></clipPath>
    <clipPath id="clip3"><rect x="0" y="0" width="0" height="40"><animate attributeName="width" from="0" to="850" dur="1.1s" begin="2.8s" fill="freeze"/></rect></clipPath>
    <clipPath id="clip4"><rect x="0" y="0" width="0" height="40"><animate attributeName="width" from="0" to="850" dur="1.4s" begin="4.1s" fill="freeze"/></rect></clipPath>
    <clipPath id="clip5"><rect x="0" y="0" width="0" height="40"><animate attributeName="width" from="0" to="850" dur="1.5s" begin="5.7s" fill="freeze"/></rect></clipPath>
    <clipPath id="clip6"><rect x="0" y="0" width="0" height="40"><animate attributeName="width" from="0" to="850" dur="0.6s" begin="7.4s" fill="freeze"/></rect></clipPath>
  </defs>

  <!-- window -->
  <rect x="1" y="1" width="898" height="298" rx="14" fill="url(#bgGrad)" stroke="#0a1518" stroke-width="1.5"/>

  <!-- title bar -->
  <rect x="1" y="1" width="898" height="34" rx="14" fill="#0d1b1f"/>
  <rect x="1" y="20" width="898" height="15" fill="#0d1b1f"/>
  <circle cx="26" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="46" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="18" r="6" fill="#27c93f"/>
  <text x="450" y="23" text-anchor="middle" fill="#7f9a9e" font-size="12">rishit@github: ~</text>

  <!-- content -->
  <g font-size="18">
    <g clip-path="url(#clip1)">
      <text x="30" y="70" fill="#64ffda">rishit@github:~$ <tspan fill="#e6f7f8">whoami</tspan></text>
    </g>
    <g clip-path="url(#clip2)">
      <text x="30" y="102" fill="#4FD1C5">&gt; Backend Developer | Java • Spring Boot • DSA</text>
    </g>
    <g clip-path="url(#clip3)">
      <text x="30" y="144" fill="#64ffda">rishit@github:~$ <tspan fill="#e6f7f8">cat currently_building.txt</tspan></text>
    </g>
    <g clip-path="url(#clip4)">
      <text x="30" y="176" fill="#4FD1C5">&gt; AI Workspace Platform — prompt-to-frontend, Spring AI + React</text>
    </g>
    <g clip-path="url(#clip5)">
      <text x="30" y="204" fill="#4FD1C5">&gt; PrepPilot AI — adaptive interview engine, RAG + LangChain4j</text>
    </g>
    <g clip-path="url(#clip6)">
      <text x="30" y="246" fill="#64ffda">rishit@github:~$ <tspan fill="#e6f7f8">_</tspan></text>
    </g>
  </g>

  <!-- blinking cursor after prompt -->
  <rect x="222" y="232" width="11" height="20" fill="#e6f7f8" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.001;0.01;0.5;0.51;1" dur="1s" begin="8s" repeatCount="indefinite"/>
  </rect>
</svg>
